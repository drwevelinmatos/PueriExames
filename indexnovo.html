<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Exames Inteligente</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; max-width: 900px; margin: 0 auto; padding: 20px; }
        .container { background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: monospace; }
        input[type="file"] { margin-top: 5px; border: 1px dashed #3498db; padding: 15px; width: 100%; box-sizing: border-box; background: #f9fbfd; cursor: pointer; }
        button { background-color: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #output { margin-top: 30px; padding: 20px; background-color: #ecf0f1; border-left: 5px solid #27ae60; border-radius: 4px; white-space: pre-wrap; font-family: 'Courier New', Courier, monospace; display: none; }
        .loading { display: none; color: #e67e22; font-weight: bold; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔬 Extrator de Exames Laboratoriais</h2>
    <p>Carregue o arquivo PDF completo ou selecione as várias fotos do exame ao mesmo tempo.</p>
    
    <hr>

    <div class="form-group">
        <label for="apiKey">Sua API Key do Google AI Studio:</label>
        <input type="text" id="apiKey" placeholder="Cole sua API Key aqui...">
    </div>

    <!-- UPDATE 1: accept="image/*, application/pdf" e atributo "multiple" adicionados -->
    <div class="form-group">
        <label for="exameFile">Selecione o Exame (PDF ou Múltiplas Fotos):</label>
        <input type="file" id="exameFile" accept="image/*, application/pdf" multiple>
        <small style="color: #7f8c8d;">Pressione CTRL (ou Command) para selecionar várias fotos de uma vez, ou escolha um PDF.</small>
    </div>

    <div class="form-group">
        <label for="padraoTexto">Padrão do Relatório:</label>
        <textarea id="padraoTexto" rows="10">
=========================================
📝 RELATÓRIO DE EXAMES DE ROTINA [DD/MM/AAAA]
=========================================

🩸 SÉRIE VERMELHA E BRANCA (Hemograma)
- Hb: [Valor] [Unidade] 
- Ht: [Valor] [Unidade] 
- VCM: [Valor] [Unidade] 
- HCM: [Valor] [Unidade] 
- Leuco: [Valor] [Unidade] 
- Plaq: [Valor] [Unidade] 

🔩 PERFIL DE FERRO
- Fe: [Valor] [Unidade] (Ref: [Referência])
- Ferritina: [Valor] [Unidade] (Ref: [Referência])
- TIBC: [Valor] [Unidade] (Ref: [Referência])

💊 VITAMINAS
- Vitamina B12: [Valor] [Unidade] (Ref: [Referência])
- Vitamina D: [Valor] [Unidade] (Ref: [Referência])
- Vitamina A: [Valor] [Unidade] (Ref: [Referência])
- Vitamina C: [Valor] [Unidade] (Ref: [Referência])

🍬 PERFIL GLICÊMICO
- Glicose: [Valor] [Unidade] (Ref: [Referência])
- HbA1c: [Valor] [Unidade] (Ref: [Referência])

🥑 PERFIL LIPÍDICO
- CT: [Valor] [Unidade] (Ref: [Referência])
- HDL: [Valor] [Unidade] (Ref: [Referência])
- LDL: [Valor] [Unidade] (Ref: [Referência])
- Não-HDL: [Valor] [Unidade] (Ref: [Referência])
- VLDL: [Valor] [Unidade] (Ref: [Referência])
- TG: [Valor] [Unidade] (Ref: [Referência])

🦋 TIREOIDE
- TSH: [Valor] [Unidade] (Ref: [Referência])
- T4L: [Valor] [Unidade] (Ref: [Referência])

🍏 FUNÇÃO HEPÁTICA
- TGO (AST): [Valor] [Unidade] (Ref: [Referência])
- TGP (ALT): [Valor] [Unidade] (Ref: [Referência])

💧 FUNÇÃO RENAL
- Ur: [Valor] [Unidade] (Ref: [Referência])
- Cr: [Valor] [Unidade] (Ref: [Referência])

🔥 MARCADORES INFLAMATÓRIOS / ENZIMAS
- LDH: [Valor] [Unidade] (Ref: [Referência])
- VHS: [Valor] [Unidade] (Ref: [Referência])
- PCR: [Valor] [Unidade] (Ref: [Referência])

🧂 ELETRÓLITOS E MINERAIS
- Na: [Valor] [Unidade] (Ref: [Referência])
- K: [Valor] [Unidade] (Ref: [Referência])
- Cai: [Valor] [Unidade] (Ref: [Referência])
- Zn: [Valor] [Unidade] (Ref: [Referência])
- Mg: [Valor] [Unidade] (Ref: [Referência])
- P: [Valor] [Unidade] (Ref: [Referência])
- Cl: [Valor] [Unidade] (Ref: [Referência])

💩 EXAME DE FEZES
- Resultados principais: [Resumo dos achados/Parasitológico]

🚽 EXAME DE URINA
- Resultados principais: [Resumo dos achados do EAS/Urina I]

-----------------------------------------
⚠️ OBSERVAÇÃO: Os exames não encontrados na folha enviada foram marcados como "Não informado".
        </textarea>
    </div>

    <button id="btnProcessar" onclick="processarExame()">Processar Exames</button>
    <div id="loadingText" class="loading">⏳ Lendo as páginas e formatando os dados... Aguarde...</div>

    <div id="output"></div>
</div>

<script type="module">
    import { GoogleGenAI } from 'https://esm.run/@google/genai';

    window.processarExame = async function() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const fileInput = document.getElementById('exameFile');
        const padrao = document.getElementById('padraoTexto').value;
        const outputDiv = document.getElementById('output');
        const loadingText = document.getElementById('loadingText');
        const btn = document.getElementById('btnProcessar');

        if (!apiKey) { alert('Por favor, insira sua API Key.'); return; }
        // UPDATE 2: Validar se há pelo menos um arquivo
        if (fileInput.files.length === 0) { alert('Por favor, selecione os arquivos do exame.'); return; }

        try {
            btn.disabled = true;
            loadingText.style.display = 'block';
            outputDiv.style.display = 'none';

            const ai = new GoogleGenAI({ apiKey: apiKey });
            
            // UPDATE 3: Loop para ler TODOS os arquivos selecionados
            const conteudosParaEnviar = [];
            
            for (let i = 0; i < fileInput.files.length; i++) {
                const file = fileInput.files[i];
                const base64Data = await fileToGenerativePart(file);
                conteudosParaEnviar.push(base64Data);
            }

            const instrucaoSistema = 
                "Você é um assistente médico especialista em transcrição de laudos laboratoriais. " +
                "Você receberá arquivos contendo várias páginas ou várias fotos do mesmo laudo. " +
                "Sua única tarefa é extrair os dados e formatá-los rigorosamente no padrão " +
                "enviado pelo usuário. Não invente dados e não faça comentários adicionais. " +
                "Se o exame não estiver em nenhuma das páginas fornecidas, escreva 'Não informado'.";

            const promptUsuario = `Extraia os dados dos arquivos anexos e formate seguindo exatamente este padrão:\n\n${padrao}`;
            
            // Adiciona o texto como a última parte do conteúdo a ser enviado
            conteudosParaEnviar.push(promptUsuario);

            const response = await ai.models.generateContent({
                model: 'gemini-2.5-flash',
                contents: conteudosParaEnviar,
                config: {
                    systemInstruction: instrucaoSistema,
                    temperature: 0.1
                }
            });

            outputDiv.innerText = response.text;
            outputDiv.style.display = 'block';

        } catch (error) {
            console.error(error);
            alert('Ocorreu um erro ao processar o exame: ' + error.message);
        } finally {
            btn.disabled = false;
            loadingText.style.display = 'none';
        }
    }

    async function fileToGenerativePart(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => {
                const base64Part = reader.result.split(',')[1];
                resolve({
                    inlineData: {
                        data: base64Part,
                        mimeType: file.type
                    },
                });
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
</script>

</body>
</html>
